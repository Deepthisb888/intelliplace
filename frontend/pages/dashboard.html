<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="navbar">
    <div class="logo" onclick="window.location='dashboard.html'">🚀 IntelliPlace</div>

    <div class="user-menu" id="userMenu">
        <div class="user-trigger" onclick="toggleDropdown()">
            Hi, Hari 👋
        </div>
        <div class="dropdown" id="dropdown">
            <a href="<%= request.getContextPath() %>/profile">Profile</a>            
            <a href="auth.html">Logout</a>
        </div>
    </div>
</div>

<div class="subnav">
    <div class="subnav-inner">
        <a href="companies.html">Companies</a>
        <a href="apply.html">Apply</a>
        <a href="applications.html">Applications</a>
    </div>
</div>

<div class="main">

    <h1 class="welcome">Welcome back</h1>

    <div class="carousel-container">

        <button class="nav-btn left" onclick="prevSlide()">❮</button>

        <div class="carousel">

            <div class="card">
                <h3>View Companies</h3>
                <p>Explore available companies</p>
                <button onclick="window.location='companies.html'">Go</button>
            </div>

            <div class="card active">
                <h3>Apply</h3>
                <p>Submit your application</p>
                <button onclick="window.location='apply.html'">Apply</button>
            </div>

            <div class="card">
                <h3>My Applications</h3>
                <p>Track your status</p>
                <button onclick="window.location='applications.html'">View</button>
            </div>

        </div>

        <button class="nav-btn right" onclick="nextSlide()">❯</button>

    </div>

</div>

<script>
let index = 1;
const cards = document.querySelectorAll(".card");

function updateCarousel(){
    cards.forEach((card) => {
        card.classList.remove("active");
        card.style.opacity = "0.4";
        card.style.transform = "scale(0.9)";
    });

    cards[index].classList.add("active");
    cards[index].style.opacity = "1";
    cards[index].style.transform = "scale(1.1)";
}

function nextSlide(){
    index = (index + 1) % cards.length;
    updateCarousel();
}

function prevSlide(){
    index = (index - 1 + cards.length) % cards.length;
    updateCarousel();
}

setInterval(nextSlide, 4000);

updateCarousel();

function toggleDropdown(){
    document.getElementById("dropdown").classList.toggle("show");
}

window.onclick = function(e){
    if(!e.target.closest('.user-menu')){
        document.getElementById("dropdown").classList.remove("show");
    }
}
</script>

</body>
</html>
